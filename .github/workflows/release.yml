name: Release

# Tag a version (e.g. `git tag v0.1.0 && git push --tags`) to build native
# desktop apps for macOS, Linux and Windows and publish them to a GitHub Release.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          # --config re-enables signed updater artifacts (off by default so
          # local `pnpm desktop:build` works without the signing key)
          - platform: macos-latest
            args: "--config src-tauri/tauri.updater.conf.json --target universal-apple-darwin"
            rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: "--config src-tauri/tauri.updater.conf.json"
            rust_targets: "x86_64-unknown-linux-gnu"
          - platform: windows-latest
            args: "--config src-tauri/tauri.updater.conf.json"
            rust_targets: "x86_64-pc-windows-msvc"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux webview dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf build-essential libssl-dev libxdo-dev file \
            libdbus-1-dev pkg-config

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: pnpm tauri
          tagName: ${{ github.ref_name }}
          releaseName: "Incipit ${{ github.ref_name }}"
          releaseBody: "Local-first fiction writing studio. Download the installer for your platform below."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # Android APK — run manually (Actions → Release → Run workflow). Produces an
  # unsigned debug APK as a build artifact.
  android:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Install NDK
        run: sdkmanager "ndk;26.1.10909125"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - run: pnpm install --frozen-lockfile
      - name: Build debug APK
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}
        run: |
          pnpm tauri android init --ci
          pnpm tauri android build --apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: incipit-android-debug-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
